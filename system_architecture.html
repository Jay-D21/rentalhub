<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentalHub — System Architecture</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#06060f;--bg2:#0c0c1a;--card:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.07);--text:#f0f0f5;--text2:#8a8a9a;--text3:#555566;
  --blue:#3b82f6;--purple:#8b5cf6;--teal:#14b8a6;--rose:#f43f5e;--amber:#f59e0b;--green:#22c55e;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}

/* ===== MAIN LAYOUT ===== */
#app{width:100%;height:100%;position:relative;overflow:hidden;}
#canvas{width:100%;height:100%;position:relative;}
#svgLayer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;}

/* ===== HEADER ===== */
.header{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(6,6,15,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;z-index:200;}
.header-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px;}
.header-title span{background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header-hint{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px;}
.legend{display:flex;gap:16px;align-items:center;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);}
.legend-dot{width:8px;height:8px;border-radius:50%;}

/* ===== NODES ===== */
.node{
  position:absolute;z-index:10;cursor:pointer;
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:14px 18px;min-width:130px;text-align:center;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  transform:translate(-50%,-50%);
  user-select:none;
}
.node:hover{background:rgba(255,255,255,0.07);transform:translate(-50%,-50%) scale(1.06);z-index:15;}
.node.active{border-color:var(--blue);box-shadow:0 0 24px rgba(59,130,246,0.2);z-index:20;transform:translate(-50%,-50%) scale(1.08);}
.node-icon{font-size:26px;margin-bottom:6px;display:block;}
.node-label{font-size:12px;font-weight:700;letter-spacing:0.3px;line-height:1.3;}
.node-sub{font-size:10px;color:var(--text3);margin-top:3px;font-weight:400;}
.node[data-type="actor"]{border-color:rgba(139,92,246,0.25);}
.node[data-type="actor"]:hover{border-color:rgba(139,92,246,0.5);box-shadow:0 0 20px rgba(139,92,246,0.12);}
.node[data-type="platform"]{border-color:rgba(59,130,246,0.25);}
.node[data-type="platform"]:hover{border-color:rgba(59,130,246,0.5);box-shadow:0 0 20px rgba(59,130,246,0.12);}
.node[data-type="external"]{border-color:rgba(20,184,166,0.25);}
.node[data-type="external"]:hover{border-color:rgba(20,184,166,0.5);box-shadow:0 0 20px rgba(20,184,166,0.12);}
.node[data-type="safety"]{border-color:rgba(244,63,94,0.25);}
.node[data-type="safety"]:hover{border-color:rgba(244,63,94,0.5);box-shadow:0 0 20px rgba(244,63,94,0.12);}

/* ===== DETAIL PANEL ===== */
#detailPanel{
  position:fixed;top:0;right:0;width:440px;height:100%;
  background:rgba(10,10,20,0.96);backdrop-filter:blur(30px);
  border-left:1px solid var(--border);
  transform:translateX(100%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);
  z-index:300;overflow-y:auto;padding:0;
}
#detailPanel.open{transform:translateX(0);}
.panel-header{padding:24px 28px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(10,10,20,0.98);z-index:5;}
.panel-close{position:absolute;top:20px;right:20px;width:32px;height:32px;border-radius:8px;background:var(--card);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text2);transition:all 0.2s;}
.panel-close:hover{background:rgba(255,255,255,0.08);color:var(--text);}
.panel-icon{font-size:36px;margin-bottom:10px;}
.panel-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.panel-type{font-size:11px;text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-top:6px;padding:3px 10px;border-radius:6px;display:inline-block;}
.panel-type.actor{background:rgba(139,92,246,0.12);color:var(--purple);}
.panel-type.platform{background:rgba(59,130,246,0.12);color:var(--blue);}
.panel-type.external{background:rgba(20,184,166,0.12);color:var(--teal);}
.panel-type.safety{background:rgba(244,63,94,0.12);color:var(--rose);}
.panel-body{padding:24px 28px 80px;}
.panel-section{margin-bottom:28px;}
.panel-section-title{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--text3);font-weight:600;margin-bottom:12px;}
.panel-desc{font-size:14px;color:var(--text2);line-height:1.7;}
.attr-list{list-style:none;}
.attr-list li{padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;font-size:13px;display:flex;align-items:flex-start;gap:10px;}
.attr-key{color:var(--text);font-weight:600;min-width:90px;flex-shrink:0;}
.attr-val{color:var(--text2);line-height:1.5;}
.flow-list{list-style:none;counter-reset:flow;}
.flow-list li{counter-increment:flow;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;font-size:13px;color:var(--text2);line-height:1.5;position:relative;padding-left:44px;}
.flow-list li::before{content:counter(flow);position:absolute;left:14px;top:12px;width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,var(--blue),var(--purple));color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.conn-tags{display:flex;flex-wrap:wrap;gap:6px;}
.conn-tag{font-size:11px;padding:4px 10px;border-radius:6px;background:var(--card);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all 0.2s;}
.conn-tag:hover{background:rgba(59,130,246,0.1);border-color:var(--blue);color:var(--text);}
.state-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.state-item{font-size:11px;padding:6px 10px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text2);text-align:center;}
.state-item.active-state{border-color:rgba(34,197,94,0.3);color:var(--green);}
.highlight-box{background:linear-gradient(135deg,rgba(59,130,246,0.06),rgba(139,92,246,0.06));border:1px solid rgba(59,130,246,0.15);border-radius:12px;padding:16px;margin-top:12px;}
.highlight-box .hb-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px;}
.highlight-box .hb-text{font-size:12px;color:var(--text2);line-height:1.6;}

/* ===== SVG CONNECTIONS ===== */
.conn-line{stroke:rgba(255,255,255,0.06);stroke-width:1.5;fill:none;}
.conn-line.actor-conn{stroke:rgba(139,92,246,0.12);}
.conn-line.platform-conn{stroke:rgba(59,130,246,0.12);}
.conn-line.external-conn{stroke:rgba(20,184,166,0.12);}
.conn-line.safety-conn{stroke:rgba(244,63,94,0.12);}
.flow-dot{fill:var(--blue);filter:drop-shadow(0 0 4px rgba(59,130,246,0.6));}
.flow-dot.purple{fill:var(--purple);filter:drop-shadow(0 0 4px rgba(139,92,246,0.6));}
.flow-dot.teal{fill:var(--teal);filter:drop-shadow(0 0 4px rgba(20,184,166,0.6));}
.flow-dot.rose{fill:var(--rose);filter:drop-shadow(0 0 4px rgba(244,63,94,0.6));}
.flow-dot.green{fill:var(--green);filter:drop-shadow(0 0 4px rgba(34,197,94,0.6));}

/* ===== OVERLAY WHEN PANEL OPEN ===== */
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:250;opacity:0;pointer-events:none;transition:opacity 0.3s;}
#overlay.show{opacity:1;pointer-events:all;}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  #detailPanel{width:100%;}
  .node{min-width:100px;padding:10px 12px;}
  .node-icon{font-size:20px;}
  .node-label{font-size:10px;}
}
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="header-title">🏗️ <span>RentalHub</span> — System Architecture</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>Actors</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Platform</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--teal)"></div>External</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--rose)"></div>Safety</div>
    </div>
    <div class="header-hint">Click any node to explore • Dots show data flow direction</div>
  </div>
  <div id="canvas">
    <svg id="svgLayer"></svg>
  </div>
  <div id="overlay"></div>
  <div id="detailPanel">
    <div class="panel-header">
      <div class="panel-close" id="panelClose">✕</div>
      <div class="panel-icon" id="panelIcon"></div>
      <div class="panel-title" id="panelTitle"></div>
      <div class="panel-type" id="panelType"></div>
    </div>
    <div class="panel-body" id="panelBody"></div>
  </div>
</div>

<script>
// =============================================
// DATA: ALL NODES
// =============================================
const NODES = {

      attributes:[
        {k:'Access',v:'Role-Based Access Control (RBAC) — super_admin, admin, support_agent, ops_manager'},

      connections:['individual_lender','vendor_lender','renter','digilocker','listings']

  listings: {

// =============================================
// RENDER
// =============================================
const canvas = document.getElementById('canvas');
const svg = document.getElementById('svgLayer');
const panel = document.getElementById('detailPanel');
const overlay = document.getElementById('overlay');
let activeNode = null;

// Create nodes
Object.entries(NODES).forEach(([id, n]) => {
  const el = document.createElement('div');
  el.className = 'node';
  el.dataset.id = id;
  el.dataset.type = n.type;
  el.style.left = n.x + '%';
  el.style.top = `calc(${n.y}% + 26px)`;
  el.innerHTML = `<span class="node-icon">${n.icon}</span><div class="node-label">${n.label.replace(/\n/g,'<br>')}</div><div class="node-sub">${n.sub}</div>`;
  el.addEventListener('click', () => openPanel(id));
  canvas.appendChild(el);
});

// Draw SVG connections + animated dots
function getNodeCenter(id) {
  const n = NODES[id];
  const rect = canvas.getBoundingClientRect();
  return {
    x: (n.x / 100) * rect.width,
    y: (n.y / 100) * rect.height + 26
  };
}

function drawConnections() {
  svg.innerHTML = '';
  svg.setAttribute('viewBox', `0 0 ${canvas.clientWidth} ${canvas.clientHeight}`);
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  svg.appendChild(defs);

  CONNECTIONS.forEach((conn, i) => {
    const a = getNodeCenter(conn.from);
    const b = getNodeCenter(conn.to);

    // Calculate control point for curved line
    const mx = (a.x + b.x) / 2;
    const my = (a.y + b.y) / 2;
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const curveAmount = Math.min(dist * 0.15, 40);
    // Perpendicular offset for curve
    const nx = -dy / dist * curveAmount;
    const ny = dx / dist * curveAmount;
    const cx = mx + nx;
    const cy = my + ny;

    const pathId = `path-${i}`;
    const d = `M ${a.x} ${a.y} Q ${cx} ${cy} ${b.x} ${b.y}`;

    // Path element
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', d);
    path.setAttribute('id', pathId);
    path.classList.add('conn-line');
    if (conn.color === 'purple') path.classList.add('actor-conn');
    else if (conn.color === 'teal') path.classList.add('external-conn');
    else if (conn.color === 'rose') path.classList.add('safety-conn');
    else path.classList.add('platform-conn');
    svg.appendChild(path);

    // Animated dot
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('r', '3.5');
    circle.classList.add('flow-dot');
    if (conn.color === 'purple') circle.classList.add('purple');
    else if (conn.color === 'teal') circle.classList.add('teal');
    else if (conn.color === 'rose') circle.classList.add('rose');
    else if (conn.color === 'green') circle.classList.add('green');

    const anim = document.createElementNS('http://www.w3.org/2000/svg','animateMotion');
    anim.setAttribute('dur', (3 + Math.random() * 3) + 's');
    anim.setAttribute('repeatCount', 'indefinite');
    anim.setAttribute('begin', (Math.random() * 4) + 's');
    const mpath = document.createElementNS('http://www.w3.org/2000/svg','mpath');
    mpath.setAttributeNS('http://www.w3.org/1999/xlink','xlink:href','#'+pathId);
    mpath.setAttribute('href','#'+pathId);
    anim.appendChild(mpath);
    circle.appendChild(anim);
    svg.appendChild(circle);
  });
}

drawConnections();
window.addEventListener('resize', drawConnections);

// =============================================
// DETAIL PANEL
// =============================================
function openPanel(id) {
  const n = NODES[id];
  const d = n.details;
  if (activeNode) document.querySelector(`.node[data-id="${activeNode}"]`)?.classList.remove('active');
  activeNode = id;
  document.querySelector(`.node[data-id="${id}"]`)?.classList.add('active');

  document.getElementById('panelIcon').textContent = n.icon;
  document.getElementById('panelTitle').textContent = n.label.replace(/\n/g,' ');
  const typeEl = document.getElementById('panelType');
  typeEl.textContent = n.type.toUpperCase();
  typeEl.className = 'panel-type ' + n.type;

  let html = '';

  // Description
  html += `<div class="panel-section"><div class="panel-section-title">What It Is</div><div class="panel-desc">${d.description}</div></div>`;

  // Attributes
  if (d.attributes && d.attributes.length) {
    html += `<div class="panel-section"><div class="panel-section-title">Key Attributes</div><ul class="attr-list">`;
    d.attributes.forEach(a => {
      html += `<li><span class="attr-key">${a.k}</span><span class="attr-val">${a.v}</span></li>`;
    });
    html += `</ul></div>`;
  }

  // Flows
  if (d.flows && d.flows.length) {
    html += `<div class="panel-section"><div class="panel-section-title">How It Works</div><ol class="flow-list">`;
    d.flows.forEach(f => { html += `<li>${f}</li>`; });
    html += `</ol></div>`;
  }

  // Connected entities
  if (d.connections && d.connections.length) {
    html += `<div class="panel-section"><div class="panel-section-title">Connected To</div><div class="conn-tags">`;
    d.connections.forEach(c => {
      if (NODES[c]) {
        html += `<div class="conn-tag" onclick="openPanel('${c}')">${NODES[c].icon} ${NODES[c].label.replace(/\n/g,' ')}</div>`;
      }
    });
    html += `</div></div>`;
  }

  // Special: Booking state machine
  if (id === 'booking') {
    html += `<div class="panel-section"><div class="panel-section-title">Booking State Machine (16 States)</div><div class="state-grid">`;
    ['Created','Payment Pending','Confirmed','Acknowledged','Ready for Handover','In Transit','Handed Over','Active','Return Initiated','Overdue','Returned','Inspection Passed','Dispute Open','Settled','Review Pending','Completed'].forEach((s,i) => {
      const isActive = [2,7,11,15].includes(i);
      html += `<div class="state-item ${isActive?'active-state':''}">${s}</div>`;
    });
    html += `</div><div class="highlight-box"><div class="hb-title">State Flow</div><div class="hb-text">Created → Payment Pending → Confirmed → Acknowledged → Ready → In Transit → Handed Over → Active → Return Initiated → Returned → Inspection Passed → Settled → Review Pending → Completed</div></div></div>`;
  }

  // Special: Trust score breakdown
  if (id === 'reviews_trust') {
    html += `<div class="panel-section"><div class="panel-section-title">Trust Score Formula (0-100)</div>`;
    const components = [
      {name:'KYC Level',max:25,desc:'Phone=5, Aadhaar=15, Bank=20, GST=25'},
      {name:'Transaction History',max:30,desc:'0 txns=0, 1-5=10, 6-20=20, 21+=30'},
      {name:'Review Score',max:20,desc:'avg_rating × 4 (min 3 reviews to activate)'},
      {name:'Response Reliability',max:15,desc:'response_rate×10 + completion_rate×5'},
      {name:'Dispute History',max:0,desc:'0 lost=0, 1 lost=−3, 2=−7, 3+=−10 + review'},
      {name:'Social Proof',max:10,desc:'Google/FB=+3, Photo=+2, Bio=+2, Referral=+3'},
    ];
    html += `<ul class="attr-list">`;
    components.forEach(c => {
      html += `<li><span class="attr-key">${c.name} (${c.max > 0 ? '0-'+c.max : 'penalty'})</span><span class="attr-val">${c.desc}</span></li>`;
    });
    html += `</ul><div class="highlight-box"><div class="hb-title">Thresholds</div><div class="hb-text">&lt;20: "New" (limited) → 20-49: "Building Trust" → 50-79: "Trusted" (priority search) → 80+: "Top Rated" (badge + featured)</div></div></div>`;
  }

  // Special: Payment money flow
  if (id === 'payment') {
    html += `<div class="panel-section"><div class="panel-section-title">Example: ₹1,200 Camera Rental (3 days)</div><div class="highlight-box"><div class="hb-text">
      <strong>Renter pays:</strong> ₹1,200 (rental) + ₹72 (protection 6%) + ₹120 (delivery) + ₹2,500 (deposit) = <strong>₹3,892</strong><br><br>
      <strong>After successful return:</strong><br>
      → Lender gets: ₹1,200 − 12% = <strong>₹1,056</strong> (T+2)<br>
      → Platform keeps: ₹144 (commission) + ₹72 (protection) = <strong>₹216</strong><br>
      → Renter gets back: <strong>₹2,500</strong> deposit (instant)<br>
      → Dunzo gets: <strong>₹120</strong> delivery fee
    </div></div></div>`;
  }

  document.getElementById('panelBody').innerHTML = html;
  panel.classList.add('open');
  overlay.classList.add('show');
  panel.scrollTop = 0;
}

function closePanel() {
  panel.classList.remove('open');
  overlay.classList.remove('show');
  if (activeNode) {
    document.querySelector(`.node[data-id="${activeNode}"]`)?.classList.remove('active');
    activeNode = null;
  }
}

document.getElementById('panelClose').addEventListener('click', closePanel);
overlay.addEventListener('click', closePanel);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
